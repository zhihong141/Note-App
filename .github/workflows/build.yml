name: Build Notes App

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build portable exe
        run: npm run build

      - name: Upload exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Notes-portable
          path: dist/Notes-portable.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: Notes App v${{ github.run_number }}
          files: dist/Notes-portable.exe
          generate_release_notes: false
          body: |
            ## Notes App — Portable Windows Build

            **Download:** Click `Notes-portable.exe` below to download.
            No installation needed — just double-click and run.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
